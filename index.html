<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Cooking Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" role="main" aria-labelledby="app-title">
    <section class="hero-card" aria-label="App overview">
      <div class="badge">AI Micro-App</div>
      <h1 id="app-title">🤖 Kitchen Copilot</h1>
      <p>Turn your pantry and budget into a full-day cooking to-do plan with breakfast, lunch, dinner, grocery swaps, and smart timing.</p>
    </section>

    <section class="panel-card" aria-label="Planner controls">
      <div class="field-group">
        <label for="ingredients">Ingredients on hand</label>
        <textarea id="ingredients" placeholder="rice, eggs, onion, tomato"></textarea>
      </div>

      <div class="row">
        <div class="field-group small">
          <label for="budget">Budget</label>
          <input id="budget" type="number" min="0" value="180" placeholder="Budget (₹)">
        </div>

        <div class="field-group small">
          <label for="diet">Diet</label>
          <select id="diet">
            <option value="Any">Any</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Vegan">Vegan</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field-group small">
          <label for="mealType">Main focus</label>
          <select id="mealType">
            <option value="Any">Any</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
          </select>
        </div>

        <div class="field-group small">
          <label for="mode">AI Mode</label>
          <select id="mode">
            <option value="chef">🍳 Chef Mode</option>
            <option value="fitness">🏋️ Fitness Mode</option>
            <option value="budget">💰 Budget Mode</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generate-btn" type="button">✨ Generate AI Plan</button>
        <button id="surprise-btn" type="button" class="secondary">🎲 Surprise Me</button>
      </div>
      <div class="hint">The assistant adapts recipes, swaps, and shopping needs to your day.</div>
    </section>

    <section id="output" class="output-card" aria-live="polite" role="status">
      <div class="output-placeholder">
        <div class="pulse-dot"></div>
        <span>Your AI-generated daily plan will appear here.</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

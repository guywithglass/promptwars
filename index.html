<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Cooking Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <div class="hero-card">
      <div class="badge">AI Micro-App</div>
      <h1>🤖 Kitchen Copilot</h1>
      <p>Turn your pantry and budget into a full-day cooking to-do plan with breakfast, lunch, dinner, grocery swaps, and smart timing.</p>
    </div>

    <div class="panel-card">
      <div class="field-group">
        <label for="ingredients">Ingredients on hand</label>
        <textarea id="ingredients" placeholder="rice, eggs, onion, tomato"></textarea>
      </div>

      <div class="row">
        <div class="field-group small">
          <label for="budget">Budget</label>
          <input id="budget" type="number" min="0" value="180" placeholder="Budget (₹)">
        </div>

        <div class="field-group small">
          <label for="diet">Diet</label>
          <select id="diet">
            <option>Any</option>
            <option>Vegetarian</option>
            <option>Vegan</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field-group small">
          <label for="mealType">Main focus</label>
          <select id="mealType">
            <option>Any</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generate-btn" type="button" onclick="generatePlan()">✨ Generate AI Plan</button>
        <button id="surprise-btn" type="button" class="secondary" onclick="surpriseMe()">🎲 Surprise Me</button>
      </div>
      <div class="hint">The assistant adapts recipes, swaps, and shopping needs to your day.</div>
    </div>

    <div id="output" class="output-card">
      <div class="output-placeholder">
        <div class="pulse-dot"></div>
        <span>Your AI-generated daily plan will appear here.</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
